<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mooncake Impact Factor</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">MoonBit Package Ranking</p>
        <h1>Mooncake Impact Factor</h1>
        <p class="intro">按下载量、被依赖次数、近期活跃度给 MoonBit 包做影响因子排序，并支持直接检索与反向依赖查看。</p>
        <form id="search-form" class="search">
          <input id="search-input" name="q" type="search" placeholder="搜索包名，例如 gmlewis/io">
          <button type="submit">Search</button>
        </form>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>Results</h2>
          <button id="top-button" type="button">Top Packages</button>
        </div>
        <div id="results" class="results"></div>
      </section>
      <section id="detail" class="panel detail empty">
        <h2>Package Detail</h2>
        <div id="detail-body">选择一个包查看详情。</div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
