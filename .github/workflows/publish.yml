name: publish-package
run-name: publish to mooncakes
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: moon version
        run: |
          moon version --all
          moonrun --version
      - name: read release version
        id: release
        run: |
          test -f moon.mod
          test ! -f moon.mod.json
          test -f README.md
          PKG_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' moon.mod)
          echo "moon.mod version: $PKG_VERSION"
          test -n "$PKG_VERSION"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
      - name: moon update
        run: |
          moon update
      - name: moon check
        run: |
          moon install
          moon check src/score --target all
          moon check src/cli --target js
      - name: moon test
        run: |
          moon test src/score --target all
      - name: publish
        run: |
          trap 'rm -f ~/.moon/credentials.json' EXIT
          echo "publishing version ${{ steps.release.outputs.version }}"
          printf '%s' "$SECRET" > ~/.moon/credentials.json
          moon publish
        env:
          SECRET: ${{ secrets.LUNA_MOONCAKE }}
